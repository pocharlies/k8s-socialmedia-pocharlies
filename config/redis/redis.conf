# Redis TLS Configuration

# Enable TLS
tls-port 6379
port 0

# TLS certificates
tls-cert-file /certs/redis.crt
tls-key-file /certs/redis.key
tls-ca-cert-file /certs/ca.crt

# TLS settings
tls-auth-clients optional
tls-protocols "TLSv1.2 TLSv1.3"
tls-prefer-server-ciphers yes

# Performance
save ""
appendonly no
