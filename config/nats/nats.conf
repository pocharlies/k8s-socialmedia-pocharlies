# NATS TLS Configuration

# Listen on TLS port
listen: 0.0.0.0:4222

# TLS configuration
tls {
    cert_file: "/certs/nats.crt"
    key_file: "/certs/nats.key"
    ca_file: "/certs/ca.crt"
    verify: false
    timeout: 2
}

# JetStream
jetstream {
    store_dir: "/data"
}

# HTTP monitoring (can also be TLS but keeping simple for now)
http: 0.0.0.0:8222
