name: Release Production

on:
  push:
    tags: ["*"]
  workflow_dispatch:
    inputs:
      image_tag:
        description: Optional explicit image tag, for example v1.2.3
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: release-prod-${{ github.repository }}
  cancel-in-progress: false

jobs:
  release:
    uses: pocharlies-org/k8s-gitops-pocharlies/.github/workflows/reusable-release.yml@main
    with:
      runner: arc-k8s
      version: ${{ github.event.inputs.image_tag || github.ref_name }}
      images: |
        [
          {"name":"whatsappmcp-whatsapp-connector","context":".","dockerfile":"connectors/whatsapp-web/Dockerfile"},
          {"name":"whatsappmcp-whatsapp-cloud-connector","context":".","dockerfile":"connectors/whatsapp-cloud/Dockerfile"},
          {"name":"whatsappmcp-telegram-connector","context":".","dockerfile":"connectors/telegram/Dockerfile"},
          {"name":"whatsappmcp-telegram-sync","context":".","dockerfile":"connectors/telegram-sync/Dockerfile"},
          {"name":"whatsappmcp-instagram-connector","context":".","dockerfile":"connectors/instagram/Dockerfile"},
          {"name":"whatsappmcp-mcp-server","context":".","dockerfile":"mcp-server/Dockerfile"},
          {"name":"whatsappmcp-auto-reply-worker","context":".","dockerfile":"workers/auto-reply-worker/Dockerfile"}
        ]
    secrets: inherit

  manifests:
    needs: [release]
    uses: pocharlies-org/k8s-gitops-pocharlies/.github/workflows/reusable-manifest-release.yml@main
    with:
      runner: arc-k8s
      source_path: k8s/overlays/prod
      artifact_name: k8s-socialmedia-pocharlies
      version: ${{ github.event.inputs.image_tag || github.ref_name }}
    secrets: inherit
