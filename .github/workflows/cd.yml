name: CD

# Triggered on merge to main.
# Builds all 7 images, pushes to GHCR with :sha-<SHA> + :latest tags,
# then updates k8s/manifest.yaml image tags and commits back → ArgoCD auto-syncs.

on:
  push:
    branches: [main]
    paths:
      - 'connectors/**'
      - 'workers/**'
      - 'mcp-server/**'
      - 'shared/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  ORG: pocharlies
  SHA_TAG: sha-${{ github.sha }}

jobs:
  # ── Build & Push ──────────────────────────────────────────────────────────
  build-push:
    name: Build & Push — ${{ matrix.service }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: whatsapp-connector
            dockerfile: connectors/whatsapp-web/Dockerfile
          - service: whatsapp-cloud-connector
            dockerfile: connectors/whatsapp-cloud/Dockerfile
          - service: telegram-connector
            dockerfile: connectors/telegram/Dockerfile
          - service: telegram-sync
            dockerfile: connectors/telegram-sync/Dockerfile
          - service: instagram-connector
            dockerfile: connectors/instagram/Dockerfile
          - service: mcp-server
            dockerfile: mcp-server/Dockerfile
          - service: auto-reply-worker
            dockerfile: workers/auto-reply-worker/Dockerfile

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.REGISTRY }}/${{ env.ORG }}/socialmedia-${{ matrix.service }}:${{ env.SHA_TAG }}
            ${{ env.REGISTRY }}/${{ env.ORG }}/socialmedia-${{ matrix.service }}:latest
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ env.ORG }}/k8s-socialmedia-pocharlies
            org.opencontainers.image.revision=${{ github.sha }}

  # ── Update k8s manifest with new SHA tags ─────────────────────────────────
  update-manifest:
    name: Update k8s manifest tags
    runs-on: ubuntu-latest
    needs: build-push
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update image tags in k8s/manifest.yaml
        run: |
          SHA_TAG="sha-${{ github.sha }}"
          REGISTRY="${{ env.REGISTRY }}/${{ env.ORG }}"
          MANIFEST="k8s/manifest.yaml"

          # Map: old harbor image → new GHCR image (with SHA tag)
          declare -A IMAGES=(
            ["harbor.e-dani.com/homelab/whatsappmcp-whatsapp-connector:.+"]="$REGISTRY/socialmedia-whatsapp-connector:$SHA_TAG"
            ["harbor.e-dani.com/homelab/whatsappmcp-whatsapp-cloud-connector:.+"]="$REGISTRY/socialmedia-whatsapp-cloud-connector:$SHA_TAG"
            ["harbor.e-dani.com/homelab/whatsappmcp-telegram-connector:.+"]="$REGISTRY/socialmedia-telegram-connector:$SHA_TAG"
            ["harbor.e-dani.com/homelab/whatsappmcp-telegram-sync:.+"]="$REGISTRY/socialmedia-telegram-sync:$SHA_TAG"
            ["harbor.e-dani.com/homelab/whatsappmcp-instagram-connector:.+"]="$REGISTRY/socialmedia-instagram-connector:$SHA_TAG"
            ["harbor.e-dani.com/homelab/whatsappmcp-mcp-server:.+"]="$REGISTRY/socialmedia-mcp-server:$SHA_TAG"
            ["harbor.e-dani.com/homelab/whatsappmcp-auto-reply-worker:.+"]="$REGISTRY/socialmedia-auto-reply-worker:$SHA_TAG"
          )

          for OLD_PATTERN in "${!IMAGES[@]}"; do
            NEW_IMAGE="${IMAGES[$OLD_PATTERN]}"
            sed -i "s|image: ${OLD_PATTERN}|image: ${NEW_IMAGE}|g" "$MANIFEST"
          done

          # Also update any existing GHCR references to new SHA
          for SERVICE in whatsapp-connector whatsapp-cloud-connector telegram-connector telegram-sync instagram-connector mcp-server auto-reply-worker; do
            sed -i "s|image: $REGISTRY/socialmedia-${SERVICE}:sha-[a-f0-9]*|image: $REGISTRY/socialmedia-${SERVICE}:$SHA_TAG|g" "$MANIFEST"
          done

          echo "Updated manifest:"
          grep "image:" "$MANIFEST"

      - name: Commit manifest update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/manifest.yaml
          if git diff --staged --quiet; then
            echo "No manifest changes to commit"
          else
            git commit -m "ci: update image tags to sha-${{ github.sha }}

            Built by: ${{ github.actor }}
            Workflow: ${{ github.run_id }}"
            git push
          fi
