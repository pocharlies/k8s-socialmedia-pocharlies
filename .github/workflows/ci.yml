name: CI

on:
  pull_request:
    branches: ["**"]
  push:
    branches: ["**"]
    tags-ignore: ["**"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  standard:
    if: ${{ !contains(github.event.head_commit.message || '', '[skip ci]') }}
    uses: pocharlies-org/k8s-gitops-pocharlies/.github/workflows/reusable-ci.yml@main
    with:
      runner: arc-k8s
      docker_build_timeout: 12m
      kustomize_paths: k8s/overlays/stg k8s/overlays/prod
      images: |
        [
          {"name":"whatsappmcp-whatsapp-connector","context":".","dockerfile":"connectors/whatsapp-web/Dockerfile"},
          {"name":"whatsappmcp-whatsapp-cloud-connector","context":".","dockerfile":"connectors/whatsapp-cloud/Dockerfile"},
          {"name":"whatsappmcp-telegram-connector","context":".","dockerfile":"connectors/telegram/Dockerfile"},
          {"name":"whatsappmcp-telegram-sync","context":".","dockerfile":"connectors/telegram-sync/Dockerfile"},
          {"name":"whatsappmcp-instagram-connector","context":".","dockerfile":"connectors/instagram/Dockerfile"},
          {"name":"whatsappmcp-mcp-server","context":".","dockerfile":"mcp-server/Dockerfile"},
          {"name":"whatsappmcp-auto-reply-worker","context":".","dockerfile":"workers/auto-reply-worker/Dockerfile"}
        ]
    secrets: inherit
