name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: ['feature/**', 'fix/**', 'claude/**']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '8.15.1'

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
        continue-on-error: true
      - run: pnpm format --check
        continue-on-error: true

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm test
        env:
          NODE_ENV: test
        continue-on-error: true

  docker-build:
    name: Build — ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: whatsapp-connector
            dockerfile: connectors/whatsapp-web/Dockerfile
          - service: whatsapp-cloud-connector
            dockerfile: connectors/whatsapp-cloud/Dockerfile
          - service: telegram-connector
            dockerfile: connectors/telegram/Dockerfile
          - service: telegram-sync
            dockerfile: connectors/telegram-sync/Dockerfile
          - service: instagram-connector
            dockerfile: connectors/instagram/Dockerfile
          - service: mcp-server
            dockerfile: mcp-server/Dockerfile
          - service: auto-reply-worker
            dockerfile: workers/auto-reply-worker/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: false
          platforms: linux/amd64
          tags: ghcr.io/pocharlies/socialmedia-${{ matrix.service }}:pr-${{ github.event.number || 'dev' }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  all-ok:
    name: All Checks Passed
    runs-on: ubuntu-latest
    needs: [lint, test, docker-build]
    if: always()
    steps:
      - name: Check build result
        run: |
          if [[ "${{ needs.docker-build.result }}" == "failure" ]]; then
            echo "Docker build failed" && exit 1
          fi
          echo "All CI checks passed"
