---
apiVersion: v1
kind: Namespace
metadata:
  name: whatsapp-mcp
---
# WhatsApp MCP — multi-connector messaging platform
# Connectors: whatsapp, instagram, telegram; MCP server + SSE bridge
# Stateful: postgres (pgvector), redis, nats, minio
# Images: harbor.e-dani.com/homelab/whatsappmcp-* — built by GitHub Actions (ubuntu-latest) → push to harbor.e-dani.com

apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: whatsapp-mcp-secrets
  namespace: whatsapp-mcp
spec:
  refreshInterval: 1h
  secretStoreRef: { name: vault-backend, kind: ClusterSecretStore }
  target:
    name: whatsapp-mcp-secrets
    creationPolicy: Owner
    deletionPolicy: Retain
  dataFrom:
    - extract: { key: secret/whatsapp-mcp }

# ── PostgreSQL (pgvector) ─────────────────────────────────────────────────────
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: whatsapp-mcp-postgres-data
  namespace: whatsapp-mcp
spec:
  accessModes: [ReadWriteOnce]
  resources: { requests: { storage: 20Gi } }
  storageClassName: longhorn
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: whatsapp-mcp-postgres
  namespace: whatsapp-mcp
spec:
  serviceName: whatsapp-mcp-postgres
  replicas: 1
  selector: { matchLabels: { app: whatsapp-mcp-postgres } }
  template:
    metadata: { labels: { app: whatsapp-mcp-postgres } }
    spec:
      enableServiceLinks: false
      nodeSelector:
        topology: lan
        kubernetes.io/arch: amd64
        kubernetes.io/hostname: ubuntu
      containers:
        - name: postgres
          image: pgvector/pgvector:pg16
          ports: [{ name: postgres, containerPort: 5432 }]
          env:
            - { name: POSTGRES_DB, value: whatsappmcp }
            - { name: PGDATA, value: /var/lib/postgresql/data/pgdata }
            - name: POSTGRES_USER
              valueFrom: { secretKeyRef: { name: whatsapp-mcp-secrets, key: DB_USER } }
            - name: POSTGRES_PASSWORD
              valueFrom: { secretKeyRef: { name: whatsapp-mcp-secrets, key: DB_PASSWORD } }
          volumeMounts:
            - { name: data, mountPath: /var/lib/postgresql/data }
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits:   { memory: 2Gi }
          readinessProbe:
            exec: { command: [pg_isready, -U, whatsappmcp, -d, whatsappmcp] }
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim: { claimName: whatsapp-mcp-postgres-data }
---
apiVersion: v1
kind: Service
metadata: { name: whatsapp-mcp-postgres, namespace: whatsapp-mcp }
spec:
  selector: { app: whatsapp-mcp-postgres }
  ports: [{ name: postgres, port: 5432, targetPort: 5432 }]

# ── Redis ──────────────────────────────────────────────────────────────────────
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: whatsapp-mcp-redis
  namespace: whatsapp-mcp
spec:
  replicas: 1
  strategy: { type: Recreate }
  selector: { matchLabels: { app: whatsapp-mcp-redis } }
  template:
    metadata: { labels: { app: whatsapp-mcp-redis } }
    spec:
      enableServiceLinks: false
      nodeSelector: { topology: lan, kubernetes.io/arch: amd64 }
      containers:
        - name: redis
          image: redis:7-alpine
          command: [redis-server, --appendonly, "yes"]
          ports: [{ name: redis, containerPort: 6379 }]
          resources:
            requests: { cpu: 20m, memory: 32Mi }
            limits:   { memory: 512Mi }
          readinessProbe:
            exec: { command: [redis-cli, ping] }
---
apiVersion: v1
kind: Service
metadata: { name: whatsapp-mcp-redis, namespace: whatsapp-mcp }
spec:
  selector: { app: whatsapp-mcp-redis }
  ports: [{ name: redis, port: 6379, targetPort: 6379 }]

# ── NATS ───────────────────────────────────────────────────────────────────────
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: whatsapp-mcp-nats-data
  namespace: whatsapp-mcp
spec:
  accessModes: [ReadWriteOnce]
  resources: { requests: { storage: 5Gi } }
  storageClassName: longhorn
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: whatsapp-mcp-nats
  namespace: whatsapp-mcp
spec:
  replicas: 1
  strategy: { type: Recreate }
  selector: { matchLabels: { app: whatsapp-mcp-nats } }
  template:
    metadata: { labels: { app: whatsapp-mcp-nats } }
    spec:
      enableServiceLinks: false
      nodeSelector: { topology: lan, kubernetes.io/arch: amd64 }
      containers:
        - name: nats
          image: nats:2.10-alpine
          args: ["-js", "-sd", "/data", "-m", "8222"]
          ports:
            - { name: client, containerPort: 4222 }
            - { name: monitor, containerPort: 8222 }
          volumeMounts:
            - { name: data, mountPath: /data }
          resources:
            requests: { cpu: 20m, memory: 64Mi }
            limits:   { memory: 512Mi }
          readinessProbe:
            httpGet: { path: /healthz, port: 8222 }
            initialDelaySeconds: 3
      volumes:
        - name: data
          persistentVolumeClaim: { claimName: whatsapp-mcp-nats-data }
---
apiVersion: v1
kind: Service
metadata: { name: whatsapp-mcp-nats, namespace: whatsapp-mcp }
spec:
  selector: { app: whatsapp-mcp-nats }
  ports:
    - { name: client, port: 4222, targetPort: 4222 }
    - { name: monitor, port: 8222, targetPort: 8222 }

# ── MinIO (media storage) ──────────────────────────────────────────────────────
# Separate instance for WhatsApp media blobs (not the shared MinIO on sauvage backbone)
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: whatsapp-mcp-minio-data
  namespace: whatsapp-mcp
spec:
  accessModes: [ReadWriteOnce]
  resources: { requests: { storage: 50Gi } }
  storageClassName: longhorn
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: whatsapp-mcp-minio
  namespace: whatsapp-mcp
spec:
  replicas: 1
  strategy: { type: Recreate }
  selector: { matchLabels: { app: whatsapp-mcp-minio } }
  template:
    metadata: { labels: { app: whatsapp-mcp-minio } }
    spec:
      enableServiceLinks: false
      nodeSelector: { topology: lan, kubernetes.io/arch: amd64 }
      containers:
        - name: minio
          image: minio/minio:latest
          args: [server, /data, --console-address, ":9001"]
          ports:
            - { name: api, containerPort: 9000 }
            - { name: console, containerPort: 9001 }
          env:
            - name: MINIO_ROOT_USER
              valueFrom: { secretKeyRef: { name: whatsapp-mcp-secrets, key: MINIO_ROOT_USER } }
            - name: MINIO_ROOT_PASSWORD
              valueFrom: { secretKeyRef: { name: whatsapp-mcp-secrets, key: MINIO_ROOT_PASSWORD } }
          volumeMounts:
            - { name: data, mountPath: /data }
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits:   { memory: 1Gi }
          readinessProbe:
            httpGet: { path: /minio/health/live, port: 9000 }
            initialDelaySeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim: { claimName: whatsapp-mcp-minio-data }
---
apiVersion: v1
kind: Service
metadata: { name: whatsapp-mcp-minio, namespace: whatsapp-mcp }
spec:
  selector: { app: whatsapp-mcp-minio }
  ports:
    - { name: api, port: 9000, targetPort: 9000 }
    - { name: console, port: 9001, targetPort: 9001 }

# ── Connectors (stateless) ────────────────────────────────────────────────────
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: whatsapp-connector
  namespace: whatsapp-mcp
spec:
  replicas: 1
  selector: { matchLabels: { app: whatsapp-connector } }
  template:
    metadata: { labels: { app: whatsapp-connector } }
    spec:
      enableServiceLinks: false
      nodeSelector: { topology: lan, kubernetes.io/arch: amd64 }
      containers:
        - name: whatsapp-connector
          image: harbor.e-dani.com/homelab/whatsappmcp-whatsapp-connector:latest
          ports: [{ name: http, containerPort: 3001 }]
          env:
            - { name: REDIS_URL, value: "redis://whatsapp-mcp-redis.whatsapp-mcp.svc.cluster.local:6379" }
            - { name: NATS_URL, value: "nats://whatsapp-mcp-nats.whatsapp-mcp.svc.cluster.local:4222" }
            - { name: DATABASE_URL, value: "postgresql://$(DB_USER):$(DB_PASSWORD)@whatsapp-mcp-postgres.whatsapp-mcp.svc.cluster.local:5432/whatsappmcp" }
          envFrom: [{ secretRef: { name: whatsapp-mcp-secrets } }]
          resources:
            requests: { cpu: 50m, memory: 128Mi }
            limits:   { memory: 512Mi }
          readinessProbe:
            httpGet: { path: /status, port: 3001 }
            initialDelaySeconds: 15
---
apiVersion: v1
kind: Service
metadata: { name: whatsapp-connector, namespace: whatsapp-mcp }
spec:
  selector: { app: whatsapp-connector }
  ports: [{ name: http, port: 3001, targetPort: 3001 }]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: whatsapp-cloud-connector
  namespace: whatsapp-mcp
spec:
  replicas: 1
  selector: { matchLabels: { app: whatsapp-cloud-connector } }
  template:
    metadata: { labels: { app: whatsapp-cloud-connector } }
    spec:
      enableServiceLinks: false
      nodeSelector: { topology: lan, kubernetes.io/arch: amd64 }
      containers:
        - name: whatsapp-cloud-connector
          image: harbor.e-dani.com/homelab/whatsappmcp-whatsapp-cloud-connector:latest
          ports: [{ name: http, containerPort: 3004 }]
          env:
            - { name: NATS_URL, value: "nats://whatsapp-mcp-nats.whatsapp-mcp.svc.cluster.local:4222" }
          envFrom: [{ secretRef: { name: whatsapp-mcp-secrets } }]
          resources:
            requests: { cpu: 30m, memory: 64Mi }
            limits:   { memory: 256Mi }
---
apiVersion: v1
kind: Service
metadata: { name: whatsapp-cloud-connector, namespace: whatsapp-mcp }
spec:
  selector: { app: whatsapp-cloud-connector }
  ports: [{ name: http, port: 3004, targetPort: 3004 }]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: instagram-connector
  namespace: whatsapp-mcp
spec:
  replicas: 1
  selector: { matchLabels: { app: instagram-connector } }
  template:
    metadata: { labels: { app: instagram-connector } }
    spec:
      enableServiceLinks: false
      nodeSelector: { topology: lan, kubernetes.io/arch: amd64 }
      containers:
        - name: instagram-connector
          image: harbor.e-dani.com/homelab/whatsappmcp-instagram-connector:latest
          ports: [{ name: http, containerPort: 3003 }]
          env:
            - { name: NATS_URL, value: "nats://whatsapp-mcp-nats.whatsapp-mcp.svc.cluster.local:4222" }
          envFrom: [{ secretRef: { name: whatsapp-mcp-secrets } }]
          resources:
            requests: { cpu: 30m, memory: 64Mi }
            limits:   { memory: 256Mi }
---
apiVersion: v1
kind: Service
metadata: { name: instagram-connector, namespace: whatsapp-mcp }
spec:
  selector: { app: instagram-connector }
  ports: [{ name: http, port: 3003, targetPort: 3003 }]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: telegram-connector
  namespace: whatsapp-mcp
spec:
  replicas: 1
  selector: { matchLabels: { app: telegram-connector } }
  template:
    metadata: { labels: { app: telegram-connector } }
    spec:
      enableServiceLinks: false
      nodeSelector: { topology: lan, kubernetes.io/arch: amd64 }
      containers:
        - name: telegram-connector
          image: harbor.e-dani.com/homelab/whatsappmcp-telegram-connector:latest
          ports: [{ name: http, containerPort: 3002 }]
          env:
            - { name: NATS_URL, value: "nats://whatsapp-mcp-nats.whatsapp-mcp.svc.cluster.local:4222" }
          envFrom: [{ secretRef: { name: whatsapp-mcp-secrets } }]
          resources:
            requests: { cpu: 30m, memory: 64Mi }
            limits:   { memory: 256Mi }
---
apiVersion: v1
kind: Service
metadata: { name: telegram-connector, namespace: whatsapp-mcp }
spec:
  selector: { app: telegram-connector }
  ports: [{ name: http, port: 3002, targetPort: 3002 }]
---
# MCP server (patched image)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-server
  namespace: whatsapp-mcp
spec:
  replicas: 1
  selector: { matchLabels: { app: mcp-server } }
  template:
    metadata: { labels: { app: mcp-server } }
    spec:
      enableServiceLinks: false
      nodeSelector: { topology: lan, kubernetes.io/arch: amd64 }
      containers:
        - name: mcp-server
          image: harbor.e-dani.com/homelab/whatsappmcp-mcp-server:latest
          ports: [{ name: http, containerPort: 3000 }]
          env:
            - { name: NATS_URL, value: "nats://whatsapp-mcp-nats.whatsapp-mcp.svc.cluster.local:4222" }
            - { name: DATABASE_URL, value: "postgresql://$(DB_USER):$(DB_PASSWORD)@whatsapp-mcp-postgres.whatsapp-mcp.svc.cluster.local:5432/whatsappmcp" }
          envFrom: [{ secretRef: { name: whatsapp-mcp-secrets } }]
          resources:
            requests: { cpu: 50m, memory: 128Mi }
            limits:   { memory: 512Mi }
---
apiVersion: v1
kind: Service
metadata: { name: mcp-server, namespace: whatsapp-mcp }
spec:
  selector: { app: mcp-server }
  ports: [{ name: http, port: 3000, targetPort: 3000 }]
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: whatsapp-public
  namespace: whatsapp-mcp
  annotations:
    external-dns.alpha.kubernetes.io/hostname: whatsapp.e-dani.com
    external-dns.alpha.kubernetes.io/target: "57.129.17.172"
    external-dns.alpha.kubernetes.io/cloudflare-proxied: "true"
spec:
  entryPoints: [websecure]
  ingressClassName: traefik-edge
  routes:
    - match: Host(`whatsapp.e-dani.com`)
      kind: Rule
      services:
        - name: whatsapp-connector
          port: 3001
  tls: {}
---
# Auto-reply worker
# Auto-reply rules config — rules array populated by admin when needed
apiVersion: v1
kind: ConfigMap
metadata:
  name: auto-reply-config
  namespace: whatsapp-mcp
data:
  config.json: '{"rules":[]}'
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auto-reply-worker
  namespace: whatsapp-mcp
spec:
  replicas: 1
  selector: { matchLabels: { app: auto-reply-worker } }
  template:
    metadata: { labels: { app: auto-reply-worker } }
    spec:
      enableServiceLinks: false
      nodeSelector: { topology: lan, kubernetes.io/arch: amd64 }
      containers:
        - name: auto-reply-worker
          image: harbor.e-dani.com/homelab/whatsappmcp-auto-reply-worker:latest
          ports: [{ name: http, containerPort: 3090 }]
          env:
            - { name: NATS_URL, value: "nats://whatsapp-mcp-nats.whatsapp-mcp.svc.cluster.local:4222" }
            - { name: LITELLM_URL, value: "http://litellm.litellm.svc.cluster.local:4000" }
          envFrom: [{ secretRef: { name: whatsapp-mcp-secrets } }]
          volumeMounts:
            - name: config
              mountPath: /worker/config.json
              subPath: config.json
          resources:
            requests: { cpu: 50m, memory: 128Mi }
            limits:   { memory: 512Mi }
      volumes:
        - name: config
          configMap:
            name: auto-reply-config
---
apiVersion: v1
kind: Service
metadata: { name: auto-reply-worker, namespace: whatsapp-mcp }
spec:
  selector: { app: auto-reply-worker }
  ports: [{ name: http, port: 3090, targetPort: 3090 }]
---
# Telegram-sync (message sync worker)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: telegram-sync
  namespace: whatsapp-mcp
spec:
  replicas: 1
  selector: { matchLabels: { app: telegram-sync } }
  template:
    metadata: { labels: { app: telegram-sync } }
    spec:
      enableServiceLinks: false
      nodeSelector: { topology: lan, kubernetes.io/arch: amd64 }
      containers:
        - name: telegram-sync
          image: harbor.e-dani.com/homelab/whatsappmcp-telegram-sync:latest
          ports: [{ name: http, containerPort: 3080 }]
          env:
            - { name: NATS_URL, value: "nats://whatsapp-mcp-nats.whatsapp-mcp.svc.cluster.local:4222" }
            - { name: DATABASE_URL, value: "postgresql://$(DB_USER):$(DB_PASSWORD)@whatsapp-mcp-postgres.whatsapp-mcp.svc.cluster.local:5432/whatsappmcp" }
            - { name: MINIO_ENDPOINT, value: "whatsapp-mcp-minio.whatsapp-mcp.svc.cluster.local:9000" }
            - { name: MINIO_ACCESS_KEY, value: "$(MINIO_ROOT_USER)" }
            - { name: MINIO_SECRET_KEY, value: "$(MINIO_ROOT_PASSWORD)" }
            - { name: MINIO_USE_SSL, value: "false" }
          envFrom: [{ secretRef: { name: whatsapp-mcp-secrets } }]
          resources:
            requests: { cpu: 100m, memory: 512Mi }
            limits:   { memory: 2Gi }   # Whisper-small model needs ~1GB RAM
---
apiVersion: v1
kind: Service
metadata: { name: telegram-sync, namespace: whatsapp-mcp }
spec:
  selector: { app: telegram-sync }
  ports: [{ name: http, port: 3080, targetPort: 3080 }]
