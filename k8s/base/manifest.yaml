            - { name: MINIO_ACCESS_KEY, value: "$(MINIO_ROOT_USER)" }
            - { name: MINIO_SECRET_KEY, value: "$(MINIO_ROOT_PASSWORD)" }
            - { name: MINIO_USE_SSL, value: "false" }
          envFrom: [{ secretRef: { name: whatsapp-mcp-secrets } }]
