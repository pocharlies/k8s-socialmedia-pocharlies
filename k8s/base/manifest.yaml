          ports: [{ name: http, containerPort: 3080 }]
          env:
            - { name: NATS_URL, value: "nats://whatsapp-mcp-nats.whatsapp-mcp.svc.cluster.local:4222" }
            - { name: DATABASE_URL, value: "postgresql://$(DB_USER):$(DB_PASSWORD)@postgres-shared-rw.databases.svc.cluster.local:5432/whatsappmcp" }
            - { name: CONNECTOR_ACCOUNT, value: "professional" }
