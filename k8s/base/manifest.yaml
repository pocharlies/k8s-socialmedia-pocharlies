---
apiVersion: v1
kind: Namespace
metadata:
  name: whatsapp-mcp
---
# WhatsApp MCP — multi-connector messaging platform
# Connectors: whatsapp, instagram, telegram; MCP server + SSE bridge
# Stateful: postgres (pgvector), redis, nats, minio
# Images: harbor.e-dani.com/homelab/whatsappmcp-* — built by GitHub Actions (ubuntu-latest) → push to harbor.e-dani.com

apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: whatsapp-mcp-secrets
  namespace: whatsapp-mcp
spec:
  refreshInterval: 1h
  secretStoreRef: { name: vault-backend, kind: ClusterSecretStore }
  target:
    name: whatsapp-mcp-secrets
    creationPolicy: Owner
    deletionPolicy: Retain
  dataFrom:
    - extract: { key: secret/whatsapp-mcp }

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: whatsapp-mcp-postgres-data
  namespace: whatsapp-mcp
spec:
  accessModes: [ReadWriteOnce]
  resources: { requests: { storage: 20Gi } }
  storageClassName: longhorn

# ── Redis ──────────────────────────────────────────────────────────────────────
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: whatsapp-mcp-redis
  namespace: whatsapp-mcp
spec:
  replicas: 1
  strategy: { type: Recreate }
  selector: { matchLabels: { app: whatsapp-mcp-redis } }
  template:
    metadata: { labels: { app: whatsapp-mcp-redis } }
    spec:
      enableServiceLinks: false
      nodeSelector: { topology: lan, kubernetes.io/arch: amd64 }
      containers:
        - name: redis
          image: redis:7-alpine
          command: [redis-server, --appendonly, "yes"]
          ports: [{ name: redis, containerPort: 6379 }]
          resources:
            requests: { cpu: 20m, memory: 32Mi }
            limits:   { memory: 512Mi }
          readinessProbe:
            exec: { command: [redis-cli, ping] }
---
apiVersion: v1
kind: Service
metadata: { name: whatsapp-mcp-redis, namespace: whatsapp-mcp }
spec:
  selector: { app: whatsapp-mcp-redis }
  ports: [{ name: redis, port: 6379, targetPort: 6379 }]

# ── NATS ───────────────────────────────────────────────────────────────────────
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: whatsapp-mcp-nats-data
  namespace: whatsapp-mcp
spec:
  accessModes: [ReadWriteOnce]
  resources: { requests: { storage: 5Gi } }
  storageClassName: longhorn
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: whatsapp-mcp-nats
  namespace: whatsapp-mcp
spec:
  replicas: 1
  strategy: { type: Recreate }
  selector: { matchLabels: { app: whatsapp-mcp-nats } }
  template:
    metadata: { labels: { app: whatsapp-mcp-nats } }
    spec:
      enableServiceLinks: false
      nodeSelector: { topology: lan, kubernetes.io/arch: amd64 }
      containers:
        - name: nats
          image: nats:2.10-alpine
          args: ["-js", "-sd", "/data", "-m", "8222"]
          ports:
            - { name: client, containerPort: 4222 }
            - { name: monitor, containerPort: 8222 }
          volumeMounts:
            - { name: data, mountPath: /data }
          resources:
            requests: { cpu: 20m, memory: 64Mi }
            limits:   { memory: 512Mi }
          readinessProbe:
            httpGet: { path: /healthz, port: 8222 }
            initialDelaySeconds: 3
      volumes:
        - name: data
          persistentVolumeClaim: { claimName: whatsapp-mcp-nats-data }
---
apiVersion: v1
kind: Service
metadata: { name: whatsapp-mcp-nats, namespace: whatsapp-mcp }
spec:
  selector: { app: whatsapp-mcp-nats }
  ports:
    - { name: client, port: 4222, targetPort: 4222 }
    - { name: monitor, port: 8222, targetPort: 8222 }

# ── MinIO (media storage) ──────────────────────────────────────────────────────
# Separate instance for WhatsApp media blobs (not the shared MinIO on sauvage backbone)
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: whatsapp-mcp-minio-data
  namespace: whatsapp-mcp
spec:
  accessModes: [ReadWriteOnce]
  resources: { requests: { storage: 50Gi } }
  storageClassName: longhorn
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: whatsapp-mcp-minio
  namespace: whatsapp-mcp
spec:
  replicas: 1
  strategy: { type: Recreate }
  selector: { matchLabels: { app: whatsapp-mcp-minio } }
  template:
    metadata: { labels: { app: whatsapp-mcp-minio } }
    spec:
      enableServiceLinks: false
      nodeSelector: { topology: lan, kubernetes.io/arch: amd64 }
      containers:
        - name: minio
          image: minio/minio:latest
          args: [server, /data, --console-address, ":9001"]
          ports:
            - { name: api, containerPort: 9000 }
            - { name: console, containerPort: 9001 }
          env:
            - name: MINIO_ROOT_USER
              valueFrom: { secretKeyRef: { name: whatsapp-mcp-secrets, key: MINIO_ROOT_USER } }
            - name: MINIO_ROOT_PASSWORD
              valueFrom: { secretKeyRef: { name: whatsapp-mcp-secrets, key: MINIO_ROOT_PASSWORD } }
          volumeMounts:
            - { name: data, mountPath: /data }
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits:   { memory: 1Gi }
          readinessProbe:
            httpGet: { path: /minio/health/live, port: 9000 }
            initialDelaySeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim: { claimName: whatsapp-mcp-minio-data }
---
apiVersion: v1
kind: Service
metadata: { name: whatsapp-mcp-minio, namespace: whatsapp-mcp }
spec:
  selector: { app: whatsapp-mcp-minio }
  ports:
    - { name: api, port: 9000, targetPort: 9000 }
    - { name: console, port: 9001, targetPort: 9001 }

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: whatsapp-session-data
  namespace: whatsapp-mcp
spec:
  accessModes: [ReadWriteOnce]
  resources: { requests: { storage: 1Gi } }
  storageClassName: longhorn
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: whatsapp-session-data-professional
  namespace: whatsapp-mcp
spec:
  accessModes: [ReadWriteOnce]
  resources: { requests: { storage: 1Gi } }
  storageClassName: longhorn

# ── Connectors (stateless) ────────────────────────────────────────────────────
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: whatsapp-connector
  namespace: whatsapp-mcp
spec:
  replicas: 1
  strategy: { type: Recreate }
  selector: { matchLabels: { app: whatsapp-connector } }
  template:
    metadata: { labels: { app: whatsapp-connector } }
    spec:
      enableServiceLinks: false
      nodeSelector: { topology: lan, kubernetes.io/arch: amd64 }
      containers:
        - name: whatsapp-connector
          image: harbor.e-dani.com/homelab/whatsappmcp-whatsapp-connector:1357057afaf6@sha256:6a0789feb3fe2b268659508bbab259cfdf4a997513f83bc58fa181245aa67aae
          ports: [{ name: http, containerPort: 3001 }]
          env:
            - { name: REDIS_URL, value: "redis://whatsapp-mcp-redis.whatsapp-mcp.svc.cluster.local:6379" }
            - { name: NATS_URL, value: "nats://whatsapp-mcp-nats.whatsapp-mcp.svc.cluster.local:4222" }
            - { name: DATABASE_URL, value: "postgresql://$(DB_USER):$(DB_PASSWORD)@postgres-shared-rw.databases.svc.cluster.local:5432/whatsappmcp" }
            - { name: ENABLE_SENDING, value: "true" }
            - { name: SESSION_PATH, value: "/app/persistent-session" }
            - { name: WA_QR_PUBLIC_URL, value: "https://whatsapp.e-dani.com/qr/page" }
            - { name: MINIO_ENDPOINT, value: "whatsapp-mcp-minio.whatsapp-mcp.svc.cluster.local:9000" }
            - { name: MINIO_ACCESS_KEY, value: "$(MINIO_ROOT_USER)" }
            - { name: MINIO_SECRET_KEY, value: "$(MINIO_ROOT_PASSWORD)" }
            - { name: MINIO_USE_SSL, value: "false" }
            - { name: MINIO_BUCKET, value: "socialmedia-media" }
            - { name: EMBEDDING_BASE_URL, value: "http://bge-m3-embedding.llm.svc.cluster.local:8000/v1" }
            - { name: EMBEDDING_MODEL, value: "bge-m3" }
            - { name: EMBEDDING_DIMENSION, value: "1024" }
          envFrom: [{ secretRef: { name: whatsapp-mcp-secrets } }]
          resources:
            requests: { cpu: 50m, memory: 128Mi }
            limits:   { memory: 512Mi }
          readinessProbe:
            httpGet: { path: /api/v1/health, port: 3001 }
            initialDelaySeconds: 15
            timeoutSeconds: 3
          volumeMounts:
            - name: whatsapp-session-data
              mountPath: /app/persistent-session
      volumes:
        - name: whatsapp-session-data
          persistentVolumeClaim: { claimName: whatsapp-session-data }
---
apiVersion: v1
kind: Service
metadata: { name: whatsapp-connector, namespace: whatsapp-mcp }
spec:
  selector: { app: whatsapp-connector }
  ports: [{ name: http, port: 3001, targetPort: 3001 }]
---
# ── WhatsApp professional: a SECOND Baileys (WhatsApp Web) connector ──────────
# Same image as the personal connector; CONNECTOR_ACCOUNT=professional tags its
# events so ingestion namespaces ids. Own session PVC (RWO, can't be shared).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: whatsapp-connector-professional
  namespace: whatsapp-mcp
spec:
  replicas: 1
  strategy: { type: Recreate }
  selector: { matchLabels: { app: whatsapp-connector-professional } }
  template:
    metadata: { labels: { app: whatsapp-connector-professional } }
    spec:
      enableServiceLinks: false
      nodeSelector: { topology: lan, kubernetes.io/arch: amd64 }
      containers:
        - name: whatsapp-connector-professional
          image: harbor.e-dani.com/homelab/whatsappmcp-whatsapp-connector:1357057afaf6@sha256:6a0789feb3fe2b268659508bbab259cfdf4a997513f83bc58fa181245aa67aae
          ports: [{ name: http, containerPort: 3001 }]
          env:
            - { name: REDIS_URL, value: "redis://whatsapp-mcp-redis.whatsapp-mcp.svc.cluster.local:6379" }
            - { name: NATS_URL, value: "nats://whatsapp-mcp-nats.whatsapp-mcp.svc.cluster.local:4222" }
            - { name: DATABASE_URL, value: "postgresql://$(DB_USER):$(DB_PASSWORD)@postgres-shared-rw.databases.svc.cluster.local:5432/whatsappmcp" }
            - { name: ENABLE_SENDING, value: "true" }
            - { name: SESSION_PATH, value: "/app/persistent-session" }
            # professional account → published events carry account=professional
            - { name: CONNECTOR_ACCOUNT, value: "professional" }
            - { name: WA_QR_PUBLIC_URL, value: "https://whatsapp-pro.lan.e-dani.com/qr/page" }
            - { name: MINIO_ENDPOINT, value: "whatsapp-mcp-minio.whatsapp-mcp.svc.cluster.local:9000" }
            - { name: MINIO_ACCESS_KEY, value: "$(MINIO_ROOT_USER)" }
            - { name: MINIO_SECRET_KEY, value: "$(MINIO_ROOT_PASSWORD)" }
            - { name: MINIO_USE_SSL, value: "false" }
            - { name: MINIO_BUCKET, value: "socialmedia-media" }
            - { name: EMBEDDING_BASE_URL, value: "http://bge-m3-embedding.llm.svc.cluster.local:8000/v1" }
            - { name: EMBEDDING_MODEL, value: "bge-m3" }
            - { name: EMBEDDING_DIMENSION, value: "1024" }
          envFrom: [{ secretRef: { name: whatsapp-mcp-secrets } }]
          resources:
            requests: { cpu: 50m, memory: 128Mi }
            limits:   { memory: 512Mi }
          readinessProbe:
            httpGet: { path: /api/v1/health, port: 3001 }
            initialDelaySeconds: 15
            timeoutSeconds: 3
          volumeMounts:
            - name: whatsapp-session-data-professional
              mountPath: /app/persistent-session
      volumes:
        - name: whatsapp-session-data-professional
          persistentVolumeClaim: { claimName: whatsapp-session-data-professional }
---
apiVersion: v1
kind: Service
metadata: { name: whatsapp-connector-professional, namespace: whatsapp-mcp }
spec:
  selector: { app: whatsapp-connector-professional }
  ports: [{ name: http, port: 3001, targetPort: 3001 }]
---
# Brain ingestion: push WhatsApp/Telegram messages into SkirmBrain RAG, one
# instance per account (personal -> personal, professional -> skirmshop).
# Runs the mcp-server image (has pg + tsx + the messages schema). Idempotent:
# brain dedups by source_id; keyset cursor in `brain_ingest_cursor`.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: brain-ingest
  namespace: whatsapp-mcp
spec:
  schedule: "*/5 * * * *"
  timeZone: Europe/Madrid
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 120
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      activeDeadlineSeconds: 600
      ttlSecondsAfterFinished: 86400
      template:
        spec:
          restartPolicy: Never
          enableServiceLinks: false
          nodeSelector: { topology: lan, kubernetes.io/arch: amd64 }
          containers:
            - name: brain-ingest
              image: harbor.e-dani.com/homelab/whatsappmcp-mcp-server:latest
              command: ["sh", "-c", "cd mcp-server && tsx src/jobs/brain-ingest.ts"]
              env:
                - { name: DATABASE_URL, value: "postgresql://$(DB_USER):$(DB_PASSWORD)@postgres-shared-rw.databases.svc.cluster.local:5432/whatsappmcp" }
                - { name: BRAIN_URL, value: "http://skirmshop-brain.skirmshop-brain-prod.svc.cluster.local" }
                # BRAIN_API_KEY comes from the whatsapp-mcp-secrets (Vault) via envFrom.
              envFrom: [{ secretRef: { name: whatsapp-mcp-secrets } }]
              resources:
                requests: { cpu: 50m, memory: 128Mi }
                limits:   { memory: 512Mi }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: instagram-connector
  namespace: whatsapp-mcp
spec:
  replicas: 1
  selector: { matchLabels: { app: instagram-connector } }
  template:
    metadata: { labels: { app: instagram-connector } }
    spec:
      enableServiceLinks: false
      nodeSelector: { topology: lan, kubernetes.io/arch: amd64 }
      containers:
        - name: instagram-connector
          image: harbor.e-dani.com/homelab/whatsappmcp-instagram-connector:latest
          ports: [{ name: http, containerPort: 3003 }]
          env:
            - { name: NATS_URL, value: "nats://whatsapp-mcp-nats.whatsapp-mcp.svc.cluster.local:4222" }
          envFrom: [{ secretRef: { name: whatsapp-mcp-secrets } }]
          resources:
            requests: { cpu: 30m, memory: 64Mi }
            limits:   { memory: 256Mi }
---
apiVersion: v1
kind: Service
metadata: { name: instagram-connector, namespace: whatsapp-mcp }
spec:
  selector: { app: instagram-connector }
  ports: [{ name: http, port: 3003, targetPort: 3003 }]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: telegram-connector
  namespace: whatsapp-mcp
spec:
  replicas: 1
  selector: { matchLabels: { app: telegram-connector } }
  template:
    metadata: { labels: { app: telegram-connector } }
    spec:
      enableServiceLinks: false
      nodeSelector: { topology: lan, kubernetes.io/arch: amd64 }
      containers:
        - name: telegram-connector
          image: harbor.e-dani.com/homelab/whatsappmcp-telegram-connector:latest
          ports: [{ name: http, containerPort: 3002 }]
          env:
            - { name: NATS_URL, value: "nats://whatsapp-mcp-nats.whatsapp-mcp.svc.cluster.local:4222" }
          envFrom: [{ secretRef: { name: whatsapp-mcp-secrets } }]
          resources:
            requests: { cpu: 30m, memory: 64Mi }
            limits:   { memory: 256Mi }
---
apiVersion: v1
kind: Service
metadata: { name: telegram-connector, namespace: whatsapp-mcp }
spec:
  selector: { app: telegram-connector }
  ports: [{ name: http, port: 3002, targetPort: 3002 }]
---
# MCP server (patched image)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-server
  namespace: whatsapp-mcp
spec:
  replicas: 1
  selector: { matchLabels: { app: mcp-server } }
  template:
    metadata: { labels: { app: mcp-server } }
    spec:
      enableServiceLinks: false
      nodeSelector: { topology: lan, kubernetes.io/arch: amd64 }
      containers:
        - name: mcp-server
          image: harbor.e-dani.com/homelab/whatsappmcp-mcp-server:latest
          # run from source via tsx (same pattern as the connectors; the image
          # ships source, not a compiled dist)
          command: ["sh", "-c", "cd mcp-server && tsx src/main.ts"]
          ports: [{ name: http, containerPort: 3000 }]
          env:
            - { name: NATS_URL, value: "nats://whatsapp-mcp-nats.whatsapp-mcp.svc.cluster.local:4222" }
            - { name: DATABASE_URL, value: "postgresql://$(DB_USER):$(DB_PASSWORD)@postgres-shared-rw.databases.svc.cluster.local:5432/whatsappmcp" }
            - { name: EMBEDDING_BASE_URL, value: "http://bge-m3-embedding.llm.svc.cluster.local:8000/v1" }
            - { name: EMBEDDING_MODEL, value: "bge-m3" }
            - { name: EMBEDDING_DIMENSION, value: "1024" }
          envFrom: [{ secretRef: { name: whatsapp-mcp-secrets } }]
          resources:
            requests: { cpu: 50m, memory: 128Mi }
            limits:   { memory: 512Mi }
          readinessProbe:
            httpGet: { path: /health, port: 3000 }
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /health, port: 3000 }
            initialDelaySeconds: 30
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata: { name: mcp-server, namespace: whatsapp-mcp }
spec:
  selector: { app: mcp-server }
  ports: [{ name: http, port: 3000, targetPort: 3000 }]
---
# MCP SSE bridge for existing clients using x86:3010/sse
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-sse
  namespace: whatsapp-mcp
spec:
  replicas: 1
  strategy: { type: Recreate }
  selector: { matchLabels: { app: mcp-sse } }
  template:
    metadata: { labels: { app: mcp-sse } }
    spec:
      enableServiceLinks: false
      nodeSelector:
        kubernetes.io/hostname: ubuntu
        kubernetes.io/arch: amd64
      containers:
        - name: mcp-sse
          image: harbor.e-dani.com/homelab/whatsappmcp-mcp-server:latest
          command: ["sh", "-c", "cd mcp-server && tsx src/mcp/sse-server.ts"]
          ports:
            - { name: sse, containerPort: 3010, hostPort: 3010 }
          env:
            - { name: MCP_SSE_PORT, value: "3010" }
            - { name: DATABASE_URL, value: "postgresql://$(DB_USER):$(DB_PASSWORD)@postgres-shared-rw.databases.svc.cluster.local:5432/whatsappmcp" }
            - { name: REDIS_URL, value: "redis://whatsapp-mcp-redis.whatsapp-mcp.svc.cluster.local:6379" }
            - { name: CONNECTOR_URL, value: "http://whatsapp-connector.whatsapp-mcp.svc.cluster.local:3001" }
            - { name: TELEGRAM_CONNECTOR_URL, value: "http://telegram-connector.whatsapp-mcp.svc.cluster.local:3002" }
            - { name: INSTAGRAM_CONNECTOR_URL, value: "http://instagram-connector.whatsapp-mcp.svc.cluster.local:3003" }
            - { name: LLM_BASE_URL, value: "http://litellm.litellm.svc.cluster.local:4000/v1" }
            - { name: LLM_CHAT_MODEL, value: "tooling" }
            - { name: EMBEDDING_BASE_URL, value: "http://bge-m3-embedding.llm.svc.cluster.local:8000/v1" }
            - { name: EMBEDDING_MODEL, value: "bge-m3" }
            - name: MCP_SSE_AUTH_TOKEN
              valueFrom: { secretKeyRef: { name: whatsapp-mcp-sse-secrets, key: MCP_SSE_AUTH_TOKEN } }
          envFrom: [{ secretRef: { name: whatsapp-mcp-secrets } }]
          resources:
            requests: { cpu: 50m, memory: 128Mi }
            limits:   { memory: 512Mi }
          readinessProbe:
            httpGet: { path: /health, port: 3010 }
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /health, port: 3010 }
            initialDelaySeconds: 30
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata: { name: mcp-sse, namespace: whatsapp-mcp }
spec:
  selector: { app: mcp-sse }
  ports: [{ name: sse, port: 3010, targetPort: 3010 }]
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: whatsapp-public
  namespace: whatsapp-mcp
  annotations:
    external-dns.alpha.kubernetes.io/hostname: whatsapp.e-dani.com
    external-dns.alpha.kubernetes.io/target: "57.129.17.172"
    external-dns.alpha.kubernetes.io/cloudflare-proxied: "true"
spec:
  entryPoints: [websecure]
  ingressClassName: traefik-edge
  routes:
    - match: Host(`whatsapp.e-dani.com`)
      kind: Rule
      services:
        - name: whatsapp-connector
          port: 3001
  tls:
    store: { name: default, namespace: traefik-edge }
---
# LAN-only IngressRoute so in-host workloads (e.g. the synapse-adapter-messaging
# Hermes worker running on sauvage under user-systemd) can POST
# /api/v1/messages/send to the WhatsApp connector without going out to
# Cloudflare. Mirrors the firecrawl-lan / brain-lan pattern.
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: whatsapp-lan
  namespace: whatsapp-mcp
spec:
  entryPoints: [websecure]
  routes:
    - match: Host(`whatsapp.lan.e-dani.com`)
      kind: Rule
      services:
        - name: whatsapp-connector
          port: 3001
  tls:
    store: { name: default, namespace: traefik-lan }
---
# LAN-only IngressRoute for the professional (business) Baileys connector — used
# to scan the QR (/qr/page) to link the business number, and for in-host send.
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: whatsapp-pro-lan
  namespace: whatsapp-mcp
spec:
  entryPoints: [websecure]
  routes:
    - match: Host(`whatsapp-pro.lan.e-dani.com`)
      kind: Rule
      services:
        - name: whatsapp-connector-professional
          port: 3001
  tls:
    store: { name: default, namespace: traefik-lan }
---
# Telegram-sync (message sync worker)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: telegram-sync
  namespace: whatsapp-mcp
spec:
  replicas: 1
  selector: { matchLabels: { app: telegram-sync } }
  template:
    metadata: { labels: { app: telegram-sync } }
    spec:
      enableServiceLinks: false
      nodeSelector: { topology: lan, kubernetes.io/arch: amd64 }
      containers:
        - name: telegram-sync
          image: harbor.e-dani.com/homelab/whatsappmcp-telegram-sync:latest
          ports: [{ name: http, containerPort: 3080 }]
          env:
            - { name: NATS_URL, value: "nats://whatsapp-mcp-nats.whatsapp-mcp.svc.cluster.local:4222" }
            - { name: DATABASE_URL, value: "postgresql://$(DB_USER):$(DB_PASSWORD)@postgres-shared-rw.databases.svc.cluster.local:5432/whatsappmcp" }
            - name: TELEGRAM_SESSION_STRING
              valueFrom: { secretKeyRef: { name: whatsapp-mcp-secrets, key: TELETHON_SESSION_STRING } }
            - { name: MINIO_ENDPOINT, value: "whatsapp-mcp-minio.whatsapp-mcp.svc.cluster.local:9000" }
            - { name: MINIO_ACCESS_KEY, value: "$(MINIO_ROOT_USER)" }
            - { name: MINIO_SECRET_KEY, value: "$(MINIO_ROOT_PASSWORD)" }
            - { name: MINIO_USE_SSL, value: "false" }
          envFrom: [{ secretRef: { name: whatsapp-mcp-secrets } }]
          resources:
            requests: { cpu: 100m, memory: 512Mi }
            limits:   { memory: 2Gi }   # Whisper-small model needs ~1GB RAM
---
apiVersion: v1
kind: Service
metadata: { name: telegram-sync, namespace: whatsapp-mcp }
spec:
  selector: { app: telegram-sync }
  ports: [{ name: http, port: 3080, targetPort: 3080 }]
---
# === Professional account: second Telegram instance pair ===
# Same images as the personal instances; CONNECTOR_ACCOUNT=professional makes
# telegram-sync namespace its DB ids ("professional:tg_...") and the MCP routes
# professional Telegram actions/unread here via the code defaults
# (telegram-connector-professional:3002 / telegram-sync-professional:3080).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: telegram-connector-professional
  namespace: whatsapp-mcp
spec:
  replicas: 1  # resumed: professional session regenerated against the real professional account
  selector: { matchLabels: { app: telegram-connector-professional } }
  template:
    metadata: { labels: { app: telegram-connector-professional } }
    spec:
      enableServiceLinks: false
      nodeSelector: { topology: lan, kubernetes.io/arch: amd64 }
      containers:
        - name: telegram-connector
          image: harbor.e-dani.com/homelab/whatsappmcp-telegram-connector:latest
          ports: [{ name: http, containerPort: 3002 }]
          env:
            - { name: NATS_URL, value: "nats://whatsapp-mcp-nats.whatsapp-mcp.svc.cluster.local:4222" }
            - { name: CONNECTOR_ACCOUNT, value: "professional" }
            # override the personal session loaded via envFrom with the professional one
            - name: TELEGRAM_SESSION_STRING
              valueFrom: { secretKeyRef: { name: whatsapp-mcp-secrets, key: TELEGRAM_SESSION_STRING_PROFESSIONAL } }
          envFrom: [{ secretRef: { name: whatsapp-mcp-secrets } }]
          resources:
            requests: { cpu: 30m, memory: 64Mi }
            limits:   { memory: 256Mi }
---
apiVersion: v1
kind: Service
metadata: { name: telegram-connector-professional, namespace: whatsapp-mcp }
spec:
  selector: { app: telegram-connector-professional }
  ports: [{ name: http, port: 3002, targetPort: 3002 }]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: telegram-sync-professional
  namespace: whatsapp-mcp
spec:
  replicas: 0  # paused: see telegram-connector-professional
  selector: { matchLabels: { app: telegram-sync-professional } }
  template:
    metadata: { labels: { app: telegram-sync-professional } }
    spec:
      enableServiceLinks: false
